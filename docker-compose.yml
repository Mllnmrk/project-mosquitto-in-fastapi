services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MQTT_BROKER_HOST=mosquitto
    depends_on:
      - mosquitto
